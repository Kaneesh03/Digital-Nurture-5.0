<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13.1</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Dashboard
    </h2>

    <div class="row">

        <!-- Total Users -->
        <div class="col-md-3 mb-3">
            <div class="bg-primary text-white p-4 text-center rounded">
                <h4>150</h4>
                <p>Total Users</p>
            </div>
        </div>

        <!-- Revenue -->
        <div class="col-md-3 mb-3">
            <div class="bg-success text-white p-4 text-center rounded">
                <h4>$5000</h4>
                <p>Revenue</p>
            </div>
        </div>

        <!-- Pending Orders -->
        <div class="col-md-3 mb-3">
            <div class="bg-warning text-dark p-4 text-center rounded">
                <h4>25</h4>
                <p>Pending Orders</p>
            </div>
        </div>

        <!-- Messages -->
        <div class="col-md-3 mb-3">
            <div class="bg-danger text-white p-4 text-center rounded">
                <h4>10</h4>
                <p>Messages</p>
            </div>
        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
