<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.2</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Exercise 9.2 - Button Groups & Toggle Buttons
    </h2>

    <!-- Button Group -->
    <h4>Button Group</h4>

    <div class="btn-group mb-4" role="group">
        <button type="button" class="btn btn-primary">Left</button>
        <button type="button" class="btn btn-primary">Middle</button>
        <button type="button" class="btn btn-primary">Right</button>
    </div>

    <!-- Toggle Buttons -->
    <h4>Toggle Buttons</h4>

    <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
    <label class="btn btn-outline-success" for="check1">
        Option 1
    </label>

    <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
    <label class="btn btn-outline-danger" for="check2">
        Option 2
    </label>

    <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
    <label class="btn btn-outline-primary" for="check3">
        Option 3
    </label>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
