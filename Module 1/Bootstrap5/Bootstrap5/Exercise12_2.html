<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-5">
        Pricing Plans
    </h2>

    <div class="row">

        <!-- Basic Plan -->
        <div class="col-md-4 mb-4">
            <div class="card text-center p-4 shadow">
                <h3>Basic</h3>
                <h4 class="my-3">$10/month</h4>
                <p>1 Website</p>
                <p>10 GB Storage</p>
                <button class="btn btn-primary mt-3">
                    Choose Plan
                </button>
            </div>
        </div>

        <!-- Standard Plan -->
        <div class="col-md-4 mb-4">
            <div class="card text-center p-4 shadow">
                <h3>Standard</h3>
                <h4 class="my-3">$20/month</h4>
                <p>5 Websites</p>
                <p>50 GB Storage</p>
                <button class="btn btn-success mt-3">
                    Choose Plan
                </button>
            </div>
        </div>

        <!-- Premium Plan -->
        <div class="col-md-4 mb-4">
            <div class="card text-center p-4 shadow">
                <h3>Premium</h3>
                <h4 class="my-3">$30/month</h4>
                <p>Unlimited Websites</p>
                <p>100 GB Storage</p>
                <button class="btn btn-danger mt-3">
                    Choose Plan
                </button>
            </div>
        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
